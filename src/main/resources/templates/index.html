<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线备忘录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #ff4757;
            color: white;
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .btn-danger:hover {
            background: #ff3838;
        }

        .memo-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .memo-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
            position: relative;
        }

        .memo-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .memo-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .memo-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            flex: 1;
        }

        .memo-time {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
        }

        .memo-content {
            color: #555;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #888;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: #2ed573;
        }

        .toast.error {
            background: #ff4757;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .card {
                padding: 20px;
            }

            .memo-header {
                flex-direction: column;
            }

            .btn-danger {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 在线备忘录</h1>
            <p>记录生活中的点点滴滴</p>
        </div>

        <div class="card">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="memoCount">0</div>
                    <div class="stat-label">备忘录总数</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">
                <span>✏️</span>
                添加新备忘录
            </h2>
            <form id="memoForm">
                <div class="form-group">
                    <label for="title">标题</label>
                    <input type="text" id="title" name="title" placeholder="请输入标题（最多100字）" maxlength="100" required>
                </div>
                <div class="form-group">
                    <label for="content">内容</label>
                    <textarea id="content" name="content" placeholder="请输入内容（最多1000字）" maxlength="1000" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">添加备忘录</button>
            </form>
        </div>

        <div class="card">
            <h2 class="card-title">
                <span>📋</span>
                我的备忘录
            </h2>
            <div id="memoList" class="memo-list">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <p>暂无备忘录，快来添加一条吧！</p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE_URL = '';

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function formatTime(dateString) {
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hour}:${minute}`;
        }

        async function loadMemos() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/memos`);
                const result = await response.json();
                
                if (result.code === 200) {
                    renderMemos(result.data);
                    document.getElementById('memoCount').textContent = result.data.length;
                } else {
                    showToast(result.message || '加载失败', 'error');
                }
            } catch (error) {
                showToast('网络错误，请稍后重试', 'error');
            }
        }

        function renderMemos(memos) {
            const listContainer = document.getElementById('memoList');
            
            if (memos.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <p>暂无备忘录，快来添加一条吧！</p>
                    </div>
                `;
                return;
            }

            listContainer.innerHTML = memos.map(memo => `
                <div class="memo-item" data-id="${memo.id}">
                    <div class="memo-header">
                        <div>
                            <div class="memo-title">${escapeHtml(memo.title)}</div>
                            <div class="memo-time">${formatTime(memo.createTime)}</div>
                        </div>
                        <button class="btn btn-danger" onclick="deleteMemo(${memo.id})">删除</button>
                    </div>
                    <div class="memo-content">${escapeHtml(memo.content)}</div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function addMemo(title, content) {
            try {
                const formData = new URLSearchParams();
                formData.append('title', title);
                formData.append('content', content);

                const response = await fetch(`${API_BASE_URL}/api/memos`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formData
                });

                const result = await response.json();

                if (result.code === 200) {
                    showToast('添加成功！');
                    document.getElementById('memoForm').reset();
                    loadMemos();
                } else {
                    showToast(result.message || '添加失败', 'error');
                }
            } catch (error) {
                showToast('网络错误，请稍后重试', 'error');
            }
        }

        async function deleteMemo(id) {
            if (!confirm('确定要删除这条备忘录吗？')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/memos/${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.code === 200) {
                    showToast('删除成功！');
                    loadMemos();
                } else {
                    showToast(result.message || '删除失败', 'error');
                }
            } catch (error) {
                showToast('网络错误，请稍后重试', 'error');
            }
        }

        document.getElementById('memoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();

            if (!title) {
                showToast('请输入标题', 'error');
                return;
            }
            if (!content) {
                showToast('请输入内容', 'error');
                return;
            }

            addMemo(title, content);
        });

        loadMemos();
    </script>
</body>
</html>
